<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Орозо трекер</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--tg-theme-bg-color, #fff);
    color: var(--tg-theme-text-color, #000);
    padding: 16px 16px 100px;
    min-height: 100vh;
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; opacity: 0.5; margin-bottom: 16px; }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat {
    background: var(--tg-theme-secondary-bg-color, #f2f2f7);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
  }
  .stat-val { font-size: 22px; font-weight: 600; }
  .stat-lbl { font-size: 11px; opacity: 0.5; margin-top: 2px; }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .cal-header span { font-size: 16px; font-weight: 500; }
  .nav { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px 10px; color: var(--tg-theme-text-color, #000); }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 20px; }
  .day-name { text-align: center; font-size: 11px; opacity: 0.4; padding: 4px 0; }
  .day {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 13px;
    background: var(--tg-theme-secondary-bg-color, #f2f2f7);
    transition: transform 0.1s;
    gap: 1px;
    user-select: none;
  }
  .day:active { transform: scale(0.88); }
  .day.empty { background: none; cursor: default; pointer-events: none; }
  .day.fasted { background: #1D9E75; color: #fff; }
  .day.selected { outline: 2.5px solid #1D9E75; }
  .day.today { outline: 2px solid #378ADD; }
  .day.fasted.today { outline: 2px solid #085041; }
  .day .moon { font-size: 9px; display: none; opacity: 0.8; }
  .day.fasted .moon { display: block; }

  .preview {
    background: var(--tg-theme-secondary-bg-color, #f2f2f7);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .preview-label { font-size: 11px; opacity: 0.45; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .preview-text { font-size: 14px; line-height: 1.65; white-space: pre-wrap; color: var(--tg-theme-text-color, #000); }
  .preview-empty { font-size: 14px; opacity: 0.4; font-style: italic; }

  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 16px 24px;
    background: var(--tg-theme-bg-color, #fff);
    border-top: 0.5px solid rgba(0,0,0,0.08);
  }
  .save-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: #1D9E75;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .save-btn:disabled { opacity: 0.35; cursor: default; }
  .save-btn:not(:disabled):active { transform: scale(0.97); }

  .toast {
    position: fixed;
    top: 16px; left: 50%; transform: translateX(-50%);
    background: #1D9E75;
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: #E24B4A; }
</style>
</head>
<body>

<h1>☽ Орозо трекер</h1>
<p class="subtitle">Отметь день — нажми сохранить</p>

<div class="stats">
  <div class="stat"><div class="stat-val" id="s-month">0</div><div class="stat-lbl">в месяце</div></div>
  <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">всего</div></div>
  <div class="stat"><div class="stat-val" id="s-streak">0</div><div class="stat-lbl">серия</div></div>
</div>

<div class="cal-header">
  <button class="nav" id="prev">‹</button>
  <span id="month-label"></span>
  <button class="nav" id="next">›</button>
</div>
<div class="cal-grid" id="cal"></div>

<div class="preview">
  <div class="preview-label">Пост для канала</div>
  <div id="preview-text" class="preview-empty">Отметь день поста выше</div>
</div>

<div class="bottom-bar">
  <button class="save-btn" id="save-btn" disabled>Сохранить и опубликовать</button>
</div>

<div class="toast" id="toast"></div>

<script>
const BOT_TOKEN = 'ТВОЙ_НОВЫЙ_ТОКЕН';
const CHANNEL = '@myorozo_track';

const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAYS = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const AYATS = [
  {t:'«О вы, которые уверовали! Предписан вам пост, как он был предписан вашим предшественникам — может быть, вы будете богобоязненны.»', r:'Коран, 2:183'},
  {t:'«Поистине, постящимся и постящимся женщинам приготовил Аллах прощение и великую награду.»', r:'Коран, 33:35'},
  {t:'«Пост — щит. Когда кто-то из вас постится, пусть не говорит непристойного и не повышает голос.»', r:'Хадис (аль-Бухари)'},
  {t:'«Тому, кто постится один день ради Аллаха, Он удалит его лицо от огня на семьдесят лет.»', r:'Хадис (аль-Бухари, Муслим)'},
  {t:'«В Раю есть врата, называемые ар-Раййан. В Судный день через них войдут те, кто постился.»', r:'Хадис (аль-Бухари)'},
  {t:'«Аллах говорит: Пост — для Меня, и Я воздам за него.»', r:'Хадис Кудси (аль-Бухари)'},
  {t:'«Совершай пост — он очищает тебя.»', r:'Хадис (ан-Насаи)'},
];

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let fasted = {}, curYear, curMonth, pendingKey = null, ayatIdx = 0;

function load() {
  try { fasted = JSON.parse(localStorage.getItem('orozo_fasted') || '{}'); } catch(e) { fasted = {}; }
  ayatIdx = parseInt(localStorage.getItem('orozo_ayat') || '0');
}
function save() {
  try {
    localStorage.setItem('orozo_fasted', JSON.stringify(fasted));
    localStorage.setItem('orozo_ayat', String(ayatIdx));
  } catch(e) {}
}

function key(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function totalFasted() { return Object.values(fasted).filter(Boolean).length; }
function monthFasted(y,m) {
  return Object.keys(fasted).filter(k => k.startsWith(`${y}-${String(m+1).padStart(2,'0')}-`) && fasted[k]).length;
}
function streak() {
  const today = new Date(); today.setHours(0,0,0,0);
  let s = 0, d = new Date(today);
  while (s < 366) {
    const k = key(d.getFullYear(), d.getMonth(), d.getDate());
    if (fasted[k]) { s++; d.setDate(d.getDate()-1); } else break;
  }
  return s;
}

function buildPost(k) {
  const [y,m,d] = k.split('-').map(Number);
  const date = new Date(y, m-1, d);
  const count = Object.keys(fasted).filter(Boolean).length + (fasted[k] ? 0 : 1);
  const dateStr = date.toLocaleDateString('ru-RU', {day:'numeric', month:'long', year:'numeric'});
  const ayat = AYATS[ayatIdx % AYATS.length];
  return `☽ День поста #${count}\n${dateStr}\n\n${ayat.t}\n— ${ayat.r}\n\nАллах кабыл кылсын! 🤲`;
}

function updatePreview() {
  const el = document.getElementById('preview-text');
  const btn = document.getElementById('save-btn');
  if (pendingKey) {
    el.className = 'preview-text';
    el.textContent = buildPost(pendingKey);
    btn.disabled = false;
  } else {
    el.className = 'preview-empty';
    el.textContent = 'Отметь день поста выше';
    btn.disabled = true;
  }
}

function renderCal() {
  const cal = document.getElementById('cal');
  cal.innerHTML = '';
  DAYS.forEach(n => {
    const el = document.createElement('div');
    el.className = 'day-name';
    el.textContent = n;
    cal.appendChild(el);
  });
  const first = new Date(curYear, curMonth, 1).getDay();
  const offset = first === 0 ? 6 : first - 1;
  const days = new Date(curYear, curMonth+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  for (let i = 0; i < offset; i++) {
    const el = document.createElement('div'); el.className = 'day empty'; cal.appendChild(el);
  }
  for (let d = 1; d <= days; d++) {
    const k = key(curYear, curMonth, d);
    const el = document.createElement('div');
    el.className = 'day';
    const dt = new Date(curYear, curMonth, d);
    if (dt.getTime() === today.getTime()) el.classList.add('today');
    if (fasted[k]) el.classList.add('fasted');
    if (pendingKey === k) el.classList.add('selected');
    el.innerHTML = `<span>${d}</span><span class="moon">☽</span>`;
    el.addEventListener('click', () => {
      if (fasted[k]) {
        delete fasted[k];
        save();
        renderCal();
        updatePreview();
        return;
      }
      pendingKey = (pendingKey === k) ? null : k;
      renderCal();
      updatePreview();
    });
    cal.appendChild(el);
  }
  document.getElementById('month-label').textContent = `${MONTHS[curMonth]} ${curYear}`;
  document.getElementById('s-month').textContent = monthFasted(curYear, curMonth);
  document.getElementById('s-total').textContent = totalFasted();
  document.getElementById('s-streak').textContent = streak();
}

function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { el.className = 'toast'; }, 2800);
}

async function onSave() {
  if (!pendingKey) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Публикую...';

  const postText = buildPost(pendingKey);

  try {
    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ chat_id: CHANNEL, text: postText })
    });
    const data = await res.json();
    if (data.ok) {
      fasted[pendingKey] = true;
      ayatIdx++;
      save();
      pendingKey = null;
      renderCal();
      updatePreview();
      showToast('✅ Опубликовано в канал!', false);
    } else {
      showToast('Ошибка: ' + data.description, true);
      btn.disabled = false;
    }
  } catch(e) {
    showToast('Ошибка соединения', true);
    btn.disabled = false;
  }
  btn.textContent = 'Сохранить и опубликовать';
}

document.getElementById('prev').addEventListener('click', () => { curMonth--; if(curMonth<0){curMonth=11;curYear--;} renderCal(); });
document.getElementById('next').addEventListener('click', () => { curMonth++; if(curMonth>11){curMonth=0;curYear++;} renderCal(); });
document.getElementById('save-btn').addEventListener('click', onSave);

load();
const now = new Date();
curYear = now.getFullYear(); curMonth = now.getMonth();
renderCal();
updatePreview();
</script>
</body>
</html>
